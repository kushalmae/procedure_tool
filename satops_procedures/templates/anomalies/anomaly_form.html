{% extends "base.html" %}
{% block title %}Fleet Anomaly Tracker — Report anomaly{% endblock %}
{% block content %}
<nav class="breadcrumb" aria-label="Breadcrumb">
    <a href="{% url 'dashboard' %}">Dashboard</a> / <a href="{% url 'anomalies_registry' %}">Fleet Anomaly Tracker</a> / Report anomaly
</nav>
<h2>Report anomaly</h2>
<div class="card">
    <form method="post">{% csrf_token %}
        <label for="satellite">Satellite <span style="color: var(--fail);">*</span></label>
        <select id="satellite" name="satellite" required>
            <option value="">—</option>
            {% for s in satellites %}
            <option value="{{ s.id }}" {% if form_satellite_id == s.id %}selected{% endif %}>{{ s.name }}</option>
            {% endfor %}
        </select>
        <label for="subsystem">Subsystem</label>
        <select id="subsystem" name="subsystem">
            <option value="">—</option>
            {% for sub in subsystems %}
            <option value="{{ sub.id }}" {% if form_subsystem_id == sub.id %}selected{% endif %}>{{ sub.name }}</option>
            {% endfor %}
        </select>
        <label for="anomaly_type">Anomaly type</label>
        <select id="anomaly_type" name="anomaly_type">
            <option value="">—</option>
            {% for t in anomaly_types %}
            <option value="{{ t.id }}" {% if form_anomaly_type_id == t.id %}selected{% endif %}>{{ t.name }}</option>
            {% endfor %}
        </select>
        <label for="severity">Severity</label>
        <select id="severity" name="severity">
            {% for val, label in severity_choices %}
            <option value="{{ val }}" {% if form_severity == val %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
        </select>
        <label for="detection_time">Detection time</label>
        <input type="datetime-local" id="detection_time" name="detection_time" value="{% firstof form_detection_time detection_time_default %}">
        <label for="operational_impact">Operational impact</label>
        <select id="operational_impact" name="operational_impact">
            {% for val, label in impact_choices %}
            <option value="{{ val }}" {% if form_impact == val %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
        </select>
        <label for="description">Description / notes</label>
        <textarea id="description" name="description" rows="4" placeholder="Describe the anomaly...">{{ form_description }}</textarea>
        <p>
            <button type="submit" class="btn btn-primary">Save</button>
            <button type="submit" name="add_another" value="1" class="btn btn-secondary">Save and add another</button>
            <a href="{% url 'anomalies_registry' %}" class="btn btn-secondary">Cancel</a>
        </p>
    </form>
</div>
{% endblock %}
