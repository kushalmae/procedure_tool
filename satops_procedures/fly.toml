app = "satops-procedures"
primary_region = "iad"

[build]

[env]
  DJANGO_DEBUG = "False"
  DJANGO_ALLOWED_HOSTS = ".fly.dev"
  CSRF_TRUSTED_ORIGINS = "https://satops-procedures.fly.dev"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
