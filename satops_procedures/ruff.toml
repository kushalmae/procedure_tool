target-version = "py312"
line-length = 120

[lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes
    "I",     # isort
    "B",     # flake8-bugbear
    "UP",    # pyupgrade
]
ignore = [
    "E501",  # line too long (handled by formatter)
]

[lint.per-file-ignores]
"**/migrations/*.py" = ["E", "W", "F", "I", "B", "UP"]

[lint.isort]
known-first-party = ["satops", "procedures", "scribe", "anomalies", "handbook", "fdir", "smerequests"]
