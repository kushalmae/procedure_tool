name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: satops_procedures

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install ruff

      - name: Run ruff
        run: ruff check .

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: satops_test
          POSTGRES_USER: satops
          POSTGRES_PASSWORD: satops
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U satops"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgres://satops:satops@localhost:5432/satops_test
      DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
      DJANGO_DEBUG: "True"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: satops_procedures/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Django system checks
        run: python manage.py check

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run tests
        run: python manage.py test --verbosity=2

      - name: Run deployment checks
        env:
          DJANGO_DEBUG: "False"
          SECURE_SSL_REDIRECT: "False"
        run: python manage.py check --deploy --fail-level WARNING
        continue-on-error: true
